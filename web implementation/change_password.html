<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="atm-box">
    <h1>Password Change</h1>

    <button id="insertCardBtn" class="hidden" onclick="insertCard()">Insert Smart Card</button>

    <p id="statusText">Card Inserted</p>

    <div id="authSection">
        <input type="text" id="userId" placeholder="Enter User ID">
        <input type="password" id="oldPw" placeholder="Enter Current Password">
        <button onclick="verifyOld()">Verify</button>
    </div>

    <div id="newPwSection" class="hidden">
        <p id="msg">✔ Verification Successful</p>
        <input type="password" id="newPw" placeholder="Enter New Password" oninput="validateNewPassword()">
        <p id="pwRequirements" class="pw-requirements">
            Password must contain:<br>
            <span id="reqLength">✗ At least 10 characters</span><br>
            <span id="reqUpper">✗ At least one uppercase letter</span><br>
            <span id="reqLower">✗ At least one lowercase letter</span><br>
            <span id="reqDigit">✗ At least one number</span><br>
            <span id="reqSpecial">✗ At least one special character (!@#$%^&* etc.)</span>
        </p>
        <button id="updatePwBtn" onclick="updatePassword()" disabled>Update Password</button>
    </div>

    <p id="errorText" class="error"></p>

</div>

<!-- Load script.js which contains ALL the logic (verifyOld, updatePassword, etc.) -->
<script src="script.js"></script>

<script>
// Only page-specific navigation helper — NO redefinition of verifyOld/updatePassword
function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
